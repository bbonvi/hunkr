# Place as ~/.config/hunkr/theme.yaml to override built-in colors.
# Values accept "#RRGGBB", [r,g,b], or "reset".
# Missing keys fall back to built-in defaults. Unknown keys are ignored with a warning.
dark:
  border: "#444444"
  focus_border: "#ddbd28"
  accent: "#78c4ff"
  panel_title_bg: "#202026"
  panel_title_fg: "#dbdbdb"
  text: "#e4e4e4"
  muted: "#aaaaaa"
  dimmed: "#737373"
  footer_chip_bg: "reset"
  cursor_bg: "#34343e"
  focused_cursor_bg: "#323846"
  cursor_visual_overlap_weight: 150
  block_cursor_fg: "#f5f5f5"
  block_cursor_bg: "#5f80ff"
  visual_bg: "#3e4e6c"
  commit_selected_bg: "reset"
  commit_selected_text: "#78c4ff"
  search_match_fg: "#1e1e1e"
  search_match_bg: "#dbc460"
  search_current_fg: "#0c0c0c"
  search_current_bg: "#f6cd44"
  reviewed: "#55be78"
  unreviewed: "#ec5c5c"
  issue: "#eeb840"
  pushed: "#7ab0ca"
  unpushed: "#737373"
  diff_add: "#7bd690"
  diff_add_bg: "#13331e"
  diff_remove: "#f07c7c"
  diff_remove_bg: "#3b1717"
  diff_meta: "#ebc756"
  diff_header: "#65bce3"
  dir: "#96aae6"
  modal_bg: "reset"
  modal_editor_bg: "reset"
  modal_cursor_fg: "#f5f5f5"
  modal_cursor_bg: "#5f80ff"

