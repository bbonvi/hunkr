# hunkr runtime config
# theme.yaml: optional live-reloaded color palette at:
#   $XDG_CONFIG_HOME/hunkr/theme.yaml
#   ~/.config/hunkr/theme.yaml
# Start from ./theme.example.yaml.
# startup_theme: initial UI theme on launch. Allowed: dark, light.
startup_theme: dark
# diff_wheel_scroll_lines: number of diff lines moved per mouse wheel tick (must be >= 1).
diff_wheel_scroll_lines: 1
# list_wheel_coalesce_ms: collapse duplicate list wheel events within this window (must be >= 1).
list_wheel_coalesce_ms: 28
# nerd_fonts: enable Nerd Font icons/symbols in list and diff UI.
nerd_fonts: true
# history_limit: number of commits loaded for review history (must be >= 1).
history_limit: 400
# auto_refresh_every_secs: refresh commit+diff data cadence (must be >= 1).
auto_refresh_every_secs: 2
# relative_time_redraw_every_secs: age-label redraw cadence when auto-refresh is not sooner (must be >= 1).
relative_time_redraw_every_secs: 30
# theme_reload_poll_every_ms: how often to check theme.yaml for changes (must be >= 1).
theme_reload_poll_every_ms: 250
# selection_rebuild_debounce_ms: debounce for range-selection rebuilds (must be >= 1).
selection_rebuild_debounce_ms: 120
# terminal_clear_every_secs: full terminal clear cadence to reduce rendering artifacts (must be >= 1).
terminal_clear_every_secs: 120
# diff_cursor_scroll_off_lines: cursor gutter kept while scrolling the diff pane (must be >= 1).
diff_cursor_scroll_off_lines: 3
