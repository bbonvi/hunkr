# theme.yaml: optional live-reloaded color palette at:
#   $XDG_CONFIG_HOME/hunkr/theme.yaml
#   ~/.config/hunkr/theme.yaml
# Start from ./theme.example.yaml.
# UI theme preference. Allowed: auto, dark, light.
# `auto` follows the system appearance and falls back to dark when unavailable.
theme: auto
# number of diff lines moved per mouse wheel tick (must be >= 1).
diff_wheel_scroll_lines: 1
# collapse duplicate list wheel events within this window (must be >= 1).
list_wheel_coalesce_ms: 28
# enable Nerd Font icons/symbols in list and diff UI.
nerd_fonts: true
# number of commits loaded for review history (must be >= 1).
history_limit: 400
# refresh commit+diff data cadence (must be >= 1).
auto_refresh_every_secs: 2
# age-label redraw cadence when auto-refresh is not sooner (must be >= 1).
relative_time_redraw_every_secs: 30
# fallback poll cadence when filesystem watching is unavailable (must be >= 1).
theme_reload_poll_every_ms: 1000
# debounce for range-selection rebuilds (must be >= 1).
selection_rebuild_debounce_ms: 120
# full terminal clear cadence to reduce rendering artifacts (must be >= 1).
terminal_clear_every_secs: 120
# cursor gutter kept while scrolling the diff pane (must be >= 1).
diff_cursor_scroll_off_lines: 3
# unchanged context lines around each diff hunk (0 disables context expansion).
diff_context_lines: 3
# merge nearby hunks when their untouched gap is within this many lines (0 disables merge-by-distance).
diff_hunk_merge_distance_lines: 15
